# reoftpd example configuration
#
# Copy this file to /etc/reoftpd/reoftpd.toml and edit before starting the daemon.
#
# Generating password hashes
# --------------------------
# Each camera and viewer account requires an Argon2id password hash in the PHC
# string format.  Generate one for any password with:
#
#   reoftpd hash-password
#
# You will be prompted to enter the password; the printed string is what you
# paste into upload_password_hash / password_hash below.
#
# Alternatively use the add-camera / add-viewer sub-commands, which prompt for
# a password and append a ready-to-use TOML snippet to the live config file:
#
#   reoftpd add-camera front-door --require-tls
#   reoftpd add-viewer admin --scope all
#   reoftpd add-viewer patio --scope outdoor

# ---------------------------------------------------------------------------
# [server] — network listener settings
# ---------------------------------------------------------------------------
[server]
# IP address to bind.  Use "0.0.0.0" for all IPv4 interfaces or a specific
# LAN address (recommended — do NOT expose FTP to the public internet).
listen = "192.168.1.10"

# FTP control port.  Port 21 requires CAP_NET_BIND_SERVICE (see systemd unit).
port = 21

# Passive-mode data port range (inclusive).  Open both the control port and
# this range in your firewall.
passive_ports = [50000, 50100]

# TLS certificate and private key (PEM).  Required for FTPS (AUTH TLS).
# Generate a self-signed cert with:
#   reoftpd gencert --hostnames nvr.lan 192.168.1.10 \
#     --cert /etc/reoftpd/cert.pem --key /etc/reoftpd/key.pem
tls_cert = "/etc/reoftpd/cert.pem"
tls_key  = "/etc/reoftpd/key.pem"

# ---------------------------------------------------------------------------
# [archive] — storage settings
# ---------------------------------------------------------------------------
[archive]
# Root directory for all camera footage.  Must be owned by the reoftpd user.
root = "/srv/reolink"

# Files older than this many days are deleted by the cleanup sweep.
retention_days = 30

# ---------------------------------------------------------------------------
# [limits] — connection and rate controls
# ---------------------------------------------------------------------------
[limits]
# Maximum simultaneous connections across all clients.
# NOTE: this field is parsed but the per-IP / global connection caps are not
# yet wired into the accept loop.  Use your firewall (nftables) to enforce
# flood limits.  Only idle_timeout_secs and failed_login_lockout are active
# server-side.
max_connections = 64

# Maximum simultaneous connections from a single IP address.
max_connections_per_ip = 4

# Maximum new connections per minute from a single IP address.
new_conns_per_min_per_ip = 10

# Close idle control connections after this many seconds (active server-side).
idle_timeout_secs = 120

# Minimum sustained transfer rate; connections that fall below this for a
# sustained period may be dropped.
min_transfer_rate_bytes_per_sec = 1024

# Brute-force login lockout (active server-side via libunftp failed-login policy).
failed_login_lockout = { max_attempts = 5, window_secs = 300, ban_secs = 900 }

# ---------------------------------------------------------------------------
# [[camera]] — upload accounts (one entry per Reolink camera)
#
# The login username defaults to "name" unless overridden with "username".
# Cameras may only upload new files; they cannot overwrite, delete, rename,
# or read files.  Uploads are staged then finalized atomically.
# ---------------------------------------------------------------------------

[[camera]]
# Human-readable name; also used as the FTP login username by default.
name = "front-door"
# Optional: override the FTP login username (e.g. if the camera firmware
# does not accept hyphens in usernames).
# username = "frontdoor"
# Argon2id hash generated by: reoftpd hash-password
# PLACEHOLDER — replace with the output of: reoftpd hash-password
upload_password_hash = "$argon2id$v=19$m=65536,t=2,p=1$AAAAAAAAAAAAAAAAAAAAAA$AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
# Require TLS for this camera's uploads (recommended).
require_tls = true

[[camera]]
name = "driveway"
# PLACEHOLDER — replace with the output of: reoftpd hash-password
upload_password_hash = "$argon2id$v=19$m=65536,t=2,p=1$BBBBBBBBBBBBBBBBBBBBBB$BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB"
require_tls = true

# ---------------------------------------------------------------------------
# [group] — named groups of cameras for viewer scoping
#
# Keys are group names; values are lists of camera names from [[camera]].
# ---------------------------------------------------------------------------
[group]
outdoor = ["front-door", "driveway"]

# ---------------------------------------------------------------------------
# [[viewer]] — read-only download accounts
#
# Viewers can download footage but cannot upload, overwrite, or delete.
# scope = "all" grants access to all cameras.
# scope = ["cam1", "grp1"] restricts to the named cameras and/or groups.
# ---------------------------------------------------------------------------

[[viewer]]
name = "admin"
# PLACEHOLDER — replace with the output of: reoftpd hash-password
password_hash = "$argon2id$v=19$m=65536,t=2,p=1$CCCCCCCCCCCCCCCCCCCCCC$CCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCC"
scope = "all"

[[viewer]]
name = "patio-view"
# PLACEHOLDER — replace with the output of: reoftpd hash-password
password_hash = "$argon2id$v=19$m=65536,t=2,p=1$DDDDDDDDDDDDDDDDDDDDDD$DDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDD"
scope = ["outdoor"]
