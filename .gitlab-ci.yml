# GitLab CI for reoftpd (dev.cs.upt.ro is GitLab).
#
# - check : rustfmt + clippy (-D warnings) + tests
# - build : fully-static x86_64 Linux binary, published as a job artifact
# - release (tags only): upload the binary to the package registry + cut a Release
#
# The toolchain is pinned to 1.96.0 by rust-toolchain.toml, so rustup fetches it
# automatically regardless of the base image version.

stages:
  - check
  - build
  - release

variables:
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  CARGO_TERM_COLOR: "never"
  # Make cargo retry transient crates.io/network hiccups instead of failing the job.
  CARGO_NET_RETRY: "5"
  # Tool image for the tag-release job (NOT where the repo lives — the repo is on
  # this GitLab instance). It is pulled from gitlab.com's public registry by
  # default; if this instance's runner cannot reach gitlab.com, override
  # RELEASE_CLI_IMAGE (Settings > CI/CD > Variables) to a mirror on dev.cs.upt.ro.
  RELEASE_CLI_IMAGE: "registry.gitlab.com/gitlab-org/release-cli:latest"

# Only run pipelines for branches, tags, and merge requests (avoid duplicates).
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH'

default:
  image: rust:1.96
  # Auto-retry on infrastructure flakes (runner died, timeout) — NOT on real
  # compile/test failures, so genuine breakage still surfaces immediately.
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - api_failure
  cache:
    key: "cargo-$CI_COMMIT_REF_SLUG"
    paths:
      - .cargo/registry/
      - target/

check:
  stage: check
  script:
    - rustup component add rustfmt clippy
    - cargo fmt --all -- --check
    - cargo clippy --all-targets --locked -- -D warnings
    - cargo test --locked

# Fully-static x86_64 Linux binary — runs on any glibc version, however old.
# allow_failure: this self-hosted runner has a flaky network and occasionally
# fails to fetch musl-tools/crates; the artifact is redundant (GitHub Actions
# builds the identical binary reliably), so a transient flake here must not mark
# the whole pipeline red. Real code breakage is still gated by the `check` stage.
build:musl-x86_64:
  stage: build
  allow_failure: true
  script:
    # -o Acquire::Retries makes apt itself retry transient mirror/DNS failures
    # (the most likely cause of the occasional musl-build flake on this runner).
    - apt-get -o Acquire::Retries=3 update
    - apt-get -o Acquire::Retries=3 install -y --no-install-recommends musl-tools
    - rustup target add x86_64-unknown-linux-musl
    - cargo build --release --locked --target x86_64-unknown-linux-musl
    - install -D -m0755 target/x86_64-unknown-linux-musl/release/reoftpd dist/reoftpd-x86_64-musl
    - ./dist/reoftpd-x86_64-musl --help        # smoke-test the static binary
    - ldd dist/reoftpd-x86_64-musl || true      # expected: "not a dynamic executable"
  artifacts:
    name: "reoftpd-$CI_COMMIT_REF_SLUG-x86_64-musl"
    paths:
      - dist/reoftpd-x86_64-musl
    expire_in: 30 days

# On a git tag (e.g. v0.1.0): publish the binary to the Generic Package Registry
# and create a GitLab Release linking to it.
release:
  stage: release
  image: $RELEASE_CLI_IMAGE
  rules:
    - if: '$CI_COMMIT_TAG'
  needs:
    - job: build:musl-x86_64
      artifacts: true
  variables:
    PKG_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/reoftpd/${CI_COMMIT_TAG}/reoftpd-x86_64-musl"
  script:
    - |
      command -v curl >/dev/null 2>&1 || apk add --no-cache curl
      curl --fail --silent --show-error \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --upload-file dist/reoftpd-x86_64-musl "${PKG_URL}"
    - echo "uploaded ${PKG_URL}"
  release:
    tag_name: "$CI_COMMIT_TAG"
    description: "reoftpd $CI_COMMIT_TAG — static x86_64-musl binary attached below."
    assets:
      links:
        - name: "reoftpd-x86_64-musl"
          url: "${PKG_URL}"
